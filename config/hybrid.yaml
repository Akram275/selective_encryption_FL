benchmark:
  mode: hybrid
model:
  name: resnet_small
federated:
  rounds: 500
  local_epochs: 1
  num_clients: 3
  batch_size: 256
  samples_per_client:
  server_learning_rate: 0.05
  learning_rate_decay:
    type: step
    rate: 0.5   #1.0 means no decay
    steps: 100   #number of rounds after which to apply decay
    min_learning_rate: 0.0
crypto:
  poly_modulus_degree: 8192 #2^13 -> 4096 available slots
  scale_power: 40
selective_encryption:
  num_windows: 5
  clipping_threshold: 100.5
  dp_sigma: 0.5
  dp_learning_rate: 0.01
  microbatch_size: 64
  selection_scope: all
  stats_num_samples: 100
  stats_batch_size: 16
  coordinate_plot_frequency: 0
